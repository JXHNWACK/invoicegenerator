<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Invoice Generator (UK Sole Trader)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            color: #333;
        }
        .form-container, .invoice-container { 
            max-width: 800px; 
            margin: auto; 
            padding: 30px; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            background: #f9f9f9;
        }
        .invoice-container { 
            display: none; 
            margin-top: 20px; 
            background: #fff;
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 5px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
        button { 
            padding: 12px 20px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }
        button:hover { 
            background: #218838; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 30px; 
        }
        th, td { 
            border-bottom: 1px solid #ddd; 
            padding: 12px; 
            text-align: left; 
        }
        th { 
            background-color: #f2f2f2; 
        }
        .total-section { 
            text-align: right; 
            margin-top: 20px; 
        }
        .total-section p {
            margin: 5px 0;
        }
        
        /* CSS rules to make the PDF look clean when printing */
        @media print {
            body { margin: 0; background: #fff; }
            .form-container, .no-print { display: none !important; }
            .invoice-container { 
                display: block; 
                border: none; 
                margin: 0; 
                padding: 0; 
            }
        }
    </style>
</head>

        // Geographically matches the inputted postcode to a UK region and generates a fake local customer
        function generateLocalClient(userPostcode) {
            const match = userPostcode.trim().match(/^[a-zA-Z]+/);
            const prefix = match ? match[0].toUpperCase() : 'L'; // Extracts letters, defaults to North if missing

            const regions = {
